<!DOCTYPE html>
<html>
<head>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<title>Wall of Fame</title>
<link rel="stylesheet" href="style.css">
</head>

<body>

<header class="header-bar">
<h1>Student Achievement Wall-of-Fame</h1>
<nav>
<a href="index.html">Home</a>
<a href="submit.html">Submit Achievement</a>
<a href="admin.html">Admin Panel</a>
</nav>
</header>

<section class="hero">
    
<h2>Celebrating Student Excellence</h2>
<p id="H2">Recognizing achievements in academics, sports and cultural activities.</p>
</section>
<section class="stats">
    <div class="stats-card">
        <h3>Total Achievement</h3>
        <p id="totalCount">0</p>
    </div>

    <div class="stats-card">
        <h3>Academics</h3>
        <p id="academicCount">0</p>
    </div>

    <div class="stats-card">
        <h3>Sports</h3>
        <p id="sportsCount">0</p>
    </div>

    <div class="stats-card">
        <h3>Cultural</h3>
        <p id="culturalCount">0</p>
    </div>
</section>

<div class="container">
<table>
<thead id="tablehead">
<tr>
<th>ID</th>
<th>Student Name</th>
<th>Title</th>
<th>Category</th>
<th>Description</th>
<th>File</th>
<th>Status</th>
</tr>
</thead>

<tbody id="tablebody">
</tbody>

</table>

<div class="chart-container">
    <canvas id="achievementChart"></canvas>
</div>

<script src="script.js"></script>

</body>
</html>
