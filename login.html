<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Login | ERP Module</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<header class="navbar">
    <h1>College ERP Access</h1>
    <nav><a href="index.html">Back to Home</a></nav>
</header>

<div class="container">
    <div class="form-container" style="max-width: 400px; margin-top: 100px;">
        <h2>Staff Login</h2>
        <form id="loginForm">
            <div class="form-group">
                <label>Username / Staff ID</label>
                <input type="text" id="username" class="form-control" placeholder="Username" required>
            </div>
            
            <div class="form-group">
                <label>Password</label>
                <input type="password" id="password" class="form-control" placeholder="Password" required>
            </div>
            
            <button type="submit" class="btn-submit">Authenticate</button>
        </form>
    </div>
</div>

<script src="script.js"></script>
</body>
</html>
