<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Student Achievement – Wall of Fame Web Portal</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    
    <style>
        html, body {
            height: 100%;
        }

        body {
            display: flex;
            align-items: center;
            padding-top: 40px;
            padding-bottom: 40px;
            background-color: #497749;
        }

        .form-signin {
            width: 100%;
            max-width: 330px;
            padding: 25px; /* Increased padding slightly for the border */
            margin: auto;
            text-align: center;
            /* CHANGE 1: Added solid white border around the container */
            border: 2px solid white;
            border-radius: 10px; /* Optional: adds rounded corners to the border */
            background-color: rgba(255, 255, 255, 0.9); /* Optional: semi-transparent white background for better text contrast */
        }

        .form-signin .form-floating:focus-within {
            z-index: 2;
        }

        /* Styling to stack the inputs closely like the image */
        .form-signin input[type="email"] {
            margin-bottom: -1px;
            border-bottom-right-radius: 0;
            border-bottom-left-radius: 0;
        }

        .form-signin input[type="password"] {
            margin-bottom: 10px;
            border-top-left-radius: 0;
            border-top-right-radius: 0;
        }
    </style>
</head>
<body>

<main class="form-signin">
  <form>
    
    <h1 class="h3 mb-3 fw-normal">Please sign in</h1>

    <div class="form-floating">
      <input type="email" class="form-control" id="username" placeholder="name@example.com">
      <label for="floatingInput">Email address</label>
    </div>
    <div class="form-floating">
      <input type="password" class="form-control" id="password" placeholder="Password">
      <label for="floatingPassword">Password</label>
    </div>

    <div class="checkbox mb-3 mt-2 text-start d-flex justify-content-center">
      <label>
        <input type="checkbox" value="remember-me"> Remember me
      </label>
    </div>
    
    <button class="w-100 btn btn-lg btn-dark border border-white" type="submit">Sign in</button>
   <a href="signup.html">Sign up</a>

    <p class="mt-5 mb-3 text-muted">&copy; 2026–2028</p>
  </form>
</main>

</body>
</html>
